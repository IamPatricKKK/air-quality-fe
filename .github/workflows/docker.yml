name: Build & Push Docker

# Deployment is deferred (no VPS/domain yet). This builds and publishes an
# image to GHCR only on version tags or manual dispatch — never on every push.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Vite bakes these into the bundle at build time. All values are
          # public client-side config (safe to keep in the workflow).
          build-args: |
            VITE_AIR_QUALITY_API_URL=https://api.airquality.info.vn/api/v1
            VITE_AIR_QUALITY_BE_URL=https://be.airquality.info.vn/api/v1
            VITE_AIR_QUALITY_ADMIN_URL=https://admin.airquality.info.vn
            VITE_GOOGLE_CLIENT_ID=610754258197-6r33fbgr0moi633i1rugftv0hs7bgtcp.apps.googleusercontent.com
            VITE_VAPID_PUBLIC_KEY=BKdiE3uSpaa0TXUuHXH1VYseUfVagbJpegTfs1f2C49z9xycHOMtaQHBEneL0R8Yh_McCkq1-PBPpY60CLGJ5Fc
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
