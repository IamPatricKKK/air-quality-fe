name: Deploy Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag release để deploy (vd: v1.0.0)"
        required: true
        type: string

env:
  IMAGE: ghcr.io/iampatrickkk/air-quality-fe:production
  DEPLOY_PATH: /opt/airquality/fe
  SSH_OPTS: -o StrictHostKeyChecking=no -o ConnectTimeout=15

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Chỉ chủ repo mới được kích hoạt deploy
    if: github.actor == 'IamPatricKKK'
    environment: production
    permissions:
      contents: read
      packages: write
    concurrency:
      group: deploy-fe-production
      cancel-in-progress: false
    steps:
      - name: Guard - chỉ deploy từ tag release (v*)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            [ "${{ github.ref_type }}" = "tag" ] || { echo "::error::Chỉ deploy từ tag release."; exit 1; }
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          case "$TAG" in
            v*) echo "Deploy tag: $TAG" ;;
            *) echo "::error::Tag phải có dạng v* (vd: v1.0.0). Nhận: '$TAG'"; exit 1 ;;
          esac
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Public client-side config baked into the bundle at build time.
          build-args: |
            VITE_AIR_QUALITY_API_URL=https://api.airquality.info.vn/api/v1
            VITE_AIR_QUALITY_BE_URL=https://be.airquality.info.vn/api/v1
            VITE_AIR_QUALITY_ADMIN_URL=https://admin.airquality.info.vn
            VITE_GOOGLE_CLIENT_ID=610754258197-6r33fbgr0moi633i1rugftv0hs7bgtcp.apps.googleusercontent.com
            VITE_VAPID_PUBLIC_KEY=BKdiE3uSpaa0TXUuHXH1VYseUfVagbJpegTfs1f2C49z9xycHOMtaQHBEneL0R8Yh_McCkq1-PBPpY60CLGJ5Fc
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      - name: Add VPS to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: GHCR login on VPS
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"
      - name: Upload compose + deploy
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"
          scp ${{ env.SSH_OPTS }} docker-compose.production.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml
          echo "IMAGE=${{ env.IMAGE }}" > fe.env
          scp ${{ env.SSH_OPTS }} fe.env \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/.env
          rm -f fe.env
          ssh ${{ env.SSH_OPTS }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && docker compose pull && docker compose up -d && docker image prune -f"
